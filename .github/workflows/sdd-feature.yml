name: SDD Feature Workflow

on:
  issues:
    types: [opened, assigned, edited]
  issue_comment:
    types: [created]

jobs:
  sdd-requirements:
    if: github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude generate requirements'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_HUB_PAT }}
          fetch-depth: 1                    
      - uses: anthropics/claude-code-action@v1
        env:
          # Prepare inputs
          MODE: tag
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GIT_HUB_PAT }}
          additional_permissions: |
            actions: read
          claude_args: '--allowedTools "Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git config:*),Bash(mkdir:*),Bash(gh issue comment:*),Read,Write,Edit" --permission-mode acceptEdits'
          prompt: |
            Lee los archivos de contexto:
            - CLAUDE.md
            - docs/problem-statement.md
            - docs/decisions/ADR-001-stack-tecnologico.md

            Lee el issue #${{ github.event.issue.number }}:
            Título: "${{ github.event.issue.title }}"
            Descripción: ${{ github.event.issue.body }}

            Luego ejecuta estos pasos en orden:

            1. Crea el directorio: .specs/${{ github.event.issue.number }}-feature/
            
            2. Crea el archivo .specs/${{ github.event.issue.number }}-feature/requirements.md con:
               - User stories en formato "As a [usuario], I want [acción] so that [beneficio]"
               - Criterios de aceptación GIVEN/WHEN/THEN por cada story
               - Restricciones técnicas alineadas al ADR-001
               - Sección fuera de alcance

            3. Ejecuta los siguientes comandos git para commitear:
               git config user.email "actions@github.com"
               git config user.name "GitHub Actions"
               git add .specs/
               git commit -m "spec: add requirements for issue #${{ github.event.issue.number }}"
               git push

            4. Comenta en el issue #${{ github.event.issue.number }}:
               "✅ requirements.md generado. Revisar en .specs/${{ github.event.issue.number }}-feature/requirements.md
               Responder con @claude approve requirements para continuar con design.md"

            5. Final Update:
              - Siempre actualiza el comentario de GitHub para reflejar el estado actual de las tareas.
              - Cuando todas las tareas estén completadas, elimina el spinner y agrega un breve resumen de lo que se logró y lo que no se hizo.
              - Nota: Si ves comentarios anteriores de Claude con encabezados como "**Claude finished @user's task**" seguidos de "---", no los incluyas en tu comentario. El sistema los agrega automáticamente.
              - Si cambiaste algún archivo localmente, debes actualizarlos en la rama remota mediante comandos git (add, commit, push) antes de decir que has terminado.
              - Si creaste algo en tu rama, tu comentario debe incluir la URL del PR con el título y cuerpo prellenados mencionados anteriormente.

            Notas Importantes:
            - Toda la comunicación debe realizarse a través de los comentarios de GitHub PR.
            - Nunca crear nuevos comentarios. Solo actualiza el comentario existente usando mcp__github_comment__update_claude_comment.
            - Usa comandos git a través de la herramienta Bash para el control de versiones (recuerda que tienes acceso a estos comandos git):
              - Agregar archivos: Bash(git add <files>)
              - Confirmar cambios: Bash(git commit -m "<message>")
              - Hacer push a remoto: Bash(/home/runner/work/_actions/anthropics/claude-code-action/v1/scripts/git-push.sh origin <branch>)
              - Eliminar archivos: Bash(git rm <files>) seguido de commit y push
              - Ver estado: Bash(git status)
              - Ver diferencias: Bash(git diff)
            - Muestra la lista de tareas como una lista de verificación en el comentario de GitHub y marca las tareas a medida que avanzas.
            - INSTRUCCIONES DE CONFIGURACIÓN DEL REPOSITORIO: Los archivos CLAUDE.md del repositorio contienen instrucciones críticas de configuración específicas del repositorio, directrices de desarrollo y preferencias. Siempre lee y sigue estos archivos, particularmente el CLAUDE.md raíz, ya que proporcionan un contexto esencial para trabajar eficazmente con la base de código.
            - Usa encabezados h3 (###) para los títulos de las secciones en tus comentarios, no encabezados h1 (#).
            
            Qué PUEDES hacer:
            - Responder en un solo comentario (actualizando tu comentario inicial con el progreso y los resultados)
            - Responder preguntas sobre el código y proporcionar explicaciones
            - Realizar revisiones de código y proporcionar comentarios detallados (sin implementar a menos que se solicite)
            - Implementar cambios en el código (de complejidad simple a moderada) cuando se solicite explícitamente
            - Crear pull requests para cambios en el código escrito por humanos
            - Manejo inteligente de ramas:
              - Cuando se active en un issue: Siempre crear una nueva rama
              - Cuando se active en un PR abierto: Siempre hacer push directamente a la rama del PR existente
              - Cuando se active en un PR cerrado: Crear una nueva rama


  sdd-design:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude approve requirements')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GIT_HUB_PAT }}
          prompt: |
            Requirements aprobados para issue #${{ github.event.issue.number }}.
            Lee .specs/${{ github.event.issue.number }}-feature/requirements.md
            
            Genera design.md con:
            - Arquitectura propuesta (componentes, capas)
            - Diagrama de secuencia en Mermaid
            - Decisiones técnicas (ADRs) con justificación
            - Impacto en codebase existente
            
            Comenta en el issue pidiendo aprobación del diseño con:
            "@team Design listo. '@claude approve design' para implementar."

  sdd-implement:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude approve design')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GIT_HUB_PAT }}
          prompt: |
            Design aprobado. Lee requirements.md y design.md en
            .specs/${{ github.event.issue.number }}-feature/
            
            1. Genera tasks.md con tareas secuenciadas y sus dependencias
            2. Implementa cada task respetando el design
            3. Escribe tests unitarios por cada componente nuevo
            4. Crea un PR vinculado al issue #${{ github.event.issue.number }}
               con título: "feat: [descripción del issue]"
               Body: resumen de requirements + design decisions + tasks completadas