name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  spec-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_HUB_PAT }}
          fetch-depth: 1

      - name: Check spec directory exists
        id: check-specs
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY=$(cat <<'PR_BODY_EOF'
          ${{ github.event.pull_request.body }}
          PR_BODY_EOF
          )

          # Extract first issue number from title or body (e.g. #10)
          ISSUE_NUMBER=$(echo "$PR_TITLE $PR_BODY" | grep -oE '#[0-9]+' | head -1 | tr -d '#')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No issue number found in PR title or body — skipping spec gate."
            echo "spec_exists=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          SPEC_DIR=".specs/${ISSUE_NUMBER}-feature"
          echo "Checking for spec directory: $SPEC_DIR"
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

          if [ -d "$SPEC_DIR" ]; then
            echo "Spec directory found: $SPEC_DIR"
            echo "spec_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Spec directory NOT found: $SPEC_DIR"
            echo "spec_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Post blocking comment if specs missing
        if: steps.check-specs.outputs.spec_exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIT_HUB_PAT }}
          script: |
            const issueNumber = '${{ steps.check-specs.outputs.issue_number }}';
            const specDir = `.specs/${issueNumber}-feature`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ Specs requeridos — merge bloqueado',
                '',
                `Este PR está relacionado con el issue #${issueNumber} pero no se encontró el directorio de specs.`,
                '',
                `**Path esperado:** \`${specDir}/\``,
                '',
                'El workflow SDD requiere que existan las specs **antes** de implementar:',
                '```',
                `${specDir}/`,
                '├── requirements.md',
                '├── design.md',
                '└── tasks.md',
                '```',
                '',
                `Por favor, ejecuta el ciclo SDD completo para el issue #${issueNumber} antes de hacer merge.`,
                '',
                'Ver `docs/sdd-workflow-guide.md` para instrucciones.'
              ].join('\n')
            });

      - name: Fail if specs missing
        if: steps.check-specs.outputs.spec_exists == 'false'
        run: |
          echo "::error::Spec directory missing for issue #${{ steps.check-specs.outputs.issue_number }}. Merge blocked."
          exit 1

      - uses: anthropics/claude-code-action@v1
        if: steps.check-specs.outputs.spec_exists != 'false'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GIT_HUB_PAT }}
          use_sticky_comment: true
          track_progress: true
          include_fix_links: true
          prompt: |
            Estás revisando el PR #${{ github.event.pull_request.number }}:
            Título: "${{ github.event.pull_request.title }}"
            Rama: ${{ github.event.pull_request.head.ref }}
            Base: ${{ github.event.pull_request.base.ref }}

            Pasos:
            1. Identifica el número de issue relacionado desde el título o body del PR
            2. Busca los archivos de spec en .specs/{issue-number}-feature/:
               - requirements.md
               - design.md
               - tasks.md (si existe)
            3. Lee CLAUDE.md para conocer patrones y restricciones del proyecto
            4. Revisa los cambios del PR con: git diff origin/${{ github.event.pull_request.base.ref }}

            Luego genera un reporte de revisión con esta estructura:

            ## ✅ Cumple con el spec
            [Lista lo que está correctamente implementado]

            ## ⚠️ Incompleto
            [Lista lo que falta implementar según requirements.md o tasks.md]

            ## ❌ Viola el spec
            [Lista lo que contradice design.md o CLAUDE.md]

            ## 📋 Cobertura de criterios de aceptación
            [Por cada criterio GIVEN/WHEN/THEN del requirements.md, indica si está cubierto]

            Si no existen specs para este issue, publica un comentario indicando
            que el PR no puede ser revisado sin specs y termina con error.

            Publica el reporte como comentario en el PR.
